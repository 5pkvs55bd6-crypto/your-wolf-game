<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolf Golf Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-green-100">
    <div id="app"></div>

    <script>
        let state = {
            screen: 'gameMode',
            gameMode: null,
            players: ['', '', '', ''],
            basePoints: 1,
            hole: 1,
            results: {},
            partner: null,
            outcome: null,
            multiplier: 1,
            soloWinners: []
        };

        function getValidPlayers() {
            return state.players.filter(p => p.trim());
        }

        function getScores(upToHole) {
            const scores = {};
            const validPlayers = getValidPlayers();
            validPlayers.forEach(p => scores[p] = 0);
            let carryoverAmount = 0;

            for (let h = 1; h <= upToHole; h++) {
                if (!state.results[h]) continue;
                const r = state.results[h];

                if (r.partner === 'SOLO') {
                    const mult = r.multiplier || 1;
                    if (r.outcome === 'tie') {
                        validPlayers.forEach(p => {
                            if (r.winners && r.winners.includes(p)) {
                                if (state.gameMode !== 'shots') scores[p] += state.basePoints * mult;
                            } else {
                                scores[p] += state.gameMode === 'shots' ? (state.basePoints + carryoverAmount) * mult : -state.basePoints * mult;
                            }
                        });
                        carryoverAmount = 0;
                    } else {
                        validPlayers.forEach(p => {
                            if (r.winners && r.winners.includes(p)) {
                                if (state.gameMode !== 'shots') scores[p] += state.basePoints * mult;
                            } else {
                                if (state.gameMode === 'shots') {
                                    scores[p] += (state.basePoints + carryoverAmount) * mult;
                                } else {
                                    scores[p] -= state.basePoints * mult;
                                }
                            }
                        });
                        carryoverAmount = 0;
                    }
                } else {
                    const wolfIdx = (h - 1) % validPlayers.length;
                    const wolf = validPlayers[wolfIdx];

                    if (r.partner === 'LONE') {
                        const mult = r.multiplier || 1;
                        if (r.outcome === 'tie') {
                            carryoverAmount += state.gameMode === 'shots' ? state.basePoints * mult : state.basePoints * 3;
                        } else if (r.outcome === 'win') {
                            if (state.gameMode !== 'shots') {
                                scores[wolf] += (state.basePoints * 3 + carryoverAmount) * mult;
                            }
                            validPlayers.forEach(p => {
                                if (p !== wolf) {
                                    if (state.gameMode === 'shots') {
                                        scores[p] += (state.basePoints * 3 + carryoverAmount) * mult;
                                    } else {
                                        scores[p] -= state.basePoints * mult;
                                    }
                                }
                            });
                            carryoverAmount = 0;
                        } else if (r.outcome === 'loss') {
                            if (state.gameMode === 'shots') {
                                scores[wolf] += (state.basePoints * 2 + carryoverAmount) * mult;
                            } else {
                                scores[wolf] -= state.basePoints * 3 * mult;
                            }
                            validPlayers.forEach(p => {
                                if (p !== wolf) {
                                    if (state.gameMode !== 'shots') {
                                        scores[p] += (state.basePoints + carryoverAmount) * mult;
                                    }
                                }
                            });
                            carryoverAmount = 0;
                        }
                    } else {
                        const mult = r.multiplier || 1;
                        if (r.outcome === 'tie') {
                            carryoverAmount += state.basePoints;
                        } else if (r.outcome === 'win') {
                            if (state.gameMode !== 'shots') {
                                scores[wolf] += (state.basePoints + carryoverAmount) * mult;
                                scores[r.partner] += (state.basePoints + carryoverAmount) * mult;
                            }
                            validPlayers.forEach(p => {
                                if (p !== wolf && p !== r.partner) {
                                    if (state.gameMode === 'shots') {
                                        scores[p] += (state.basePoints + carryoverAmount) * mult;
                                    } else {
                                        scores[p] -= state.basePoints * mult;
                                    }
                                }
                            });
                            carryoverAmount = 0;
                        } else if (r.outcome === 'loss') {
                            scores[wolf] += state.gameMode === 'shots' ? (state.basePoints + carryoverAmount) * mult : -state.basePoints * mult;
                            scores[r.partner] += state.gameMode === 'shots' ? (state.basePoints + carryoverAmount) * mult : -state.basePoints * mult;
                            validPlayers.forEach(p => {
                                if (p !== wolf && p !== r.partner) {
                                    if (state.gameMode !== 'shots') {
                                        scores[p] += (state.basePoints + carryoverAmount) * mult;
                                    }
                                }
                            });
                            carryoverAmount = 0;
                        }
                    }
                }
            }
            return scores;
        }

        function setState(updates) {
            state = { ...state, ...updates };
            render();
        }

        function render() {
            const app = document.getElementById('app');
            
            if (state.screen === 'gameMode') {
                app.innerHTML = `
                    <div class="min-h-screen bg-green-100 p-4 flex items-center justify-center">
                        <div class="bg-white rounded-lg p-8 max-w-md w-full shadow-lg">
                            <h1 class="text-3xl font-bold text-green-800 mb-8 text-center">🐺 WOLF GOLF</h1>
                            <p class="text-center text-gray-600 mb-8">Select Game Type:</p>
                            <div class="space-y-3">
                                <button onclick="setState({gameMode: 'regular', screen: 'names'})" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded text-lg">⛳ REGULAR</button>
                                <p class="text-sm text-gray-600 text-center">Winners get points</p>
                                <button onclick="setState({gameMode: 'shots', screen: 'names'})" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-4 rounded text-lg">🍺 LOSERS TAKE SHOTS</button>
                                <p class="text-sm text-gray-600 text-center">Losers get points (shots at end)</p>
                            </div>
                        </div>
                    </div>
                `;
            } else if (state.screen === 'names') {
                app.innerHTML = `
                    <div class="min-h-screen bg-green-100 p-4 flex items-center justify-center">
                        <div class="bg-white rounded-lg p-8 max-w-md w-full shadow-lg">
                            <h1 class="text-3xl font-bold text-green-800 mb-8 text-center">🐺 WOLF GOLF</h1>
                            <p class="text-center text-gray-600 mb-6">Enter Player Names (2-4):</p>
                            <div class="space-y-3 mb-6">
                                ${[0,1,2,3].map(i => `<input type="text" placeholder="Player ${i+1}" value="${state.players[i]}" onchange="let p = [...state.players]; p[${i}] = this.value; setState({players: p})" class="w-full px-3 py-2 border-2 border-green-400 rounded">`).join('')}
                            </div>
                            <div class="space-y-3">
                                <button onclick="if(getValidPlayers().length < 2) {alert('Enter at least 2 players'); return;} setState({screen: 'points'})" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded">NEXT →</button>
                                <button onclick="setState({screen: 'gameMode', gameMode: null})" class="w-full bg-gray-400 hover:bg-gray-500 text-white font-bold py-2 rounded">← BACK</button>
                            </div>
                        </div>
                    </div>
                `;
            } else if (state.screen === 'points') {
                app.innerHTML = `
                    <div class="min-h-screen bg-green-100 p-4 flex items-center justify-center">
                        <div class="bg-white rounded-lg p-8 max-w-md w-full shadow-lg">
                            <h1 class="text-3xl font-bold text-green-800 mb-8 text-center">🐺 WOLF GOLF</h1>
                            <p class="text-center text-gray-600 mb-6">Points Per Hole:</p>
                            <div class="space-y-3 mb-6">
                                ${[1,2,5,10].map(pts => `<button onclick="setState({basePoints: ${pts}})" class="w-full font-bold py-3 rounded text-lg ${state.basePoints === pts ? 'bg-green-600 text-white' : 'bg-green-100 hover:bg-green-200'}">${pts} Point${pts !== 1 ? 's' : ''}</button>`).join('')}
                            </div>
                            <button onclick="setState({screen: 'play'})" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded">START GAME →</button>
                        </div>
                    </div>
                `;
            } else if (state.screen === 'play') {
                const validPlayers = getValidPlayers();
                const wolfIdx = (state.hole - 1) % validPlayers.length;
                const wolf = validPlayers[wolfIdx];
                const others = validPlayers.filter(p => p !== wolf);
                const scores = getScores(state.hole - 1);

                let outcomeHtml = '';
                if (state.partner !== 'SOLO') {
                    outcomeHtml = `
                        <div class="bg-white rounded p-4 mb-3 shadow">
                            <div class="font-bold mb-2">Outcome:</div>
                            <div class="grid grid-cols-3 gap-2">
                                <button onclick="setState({outcome: 'win'})" class="py-2 rounded ${state.outcome === 'win' ? 'bg-green-600 text-white' : 'bg-green-100 hover:bg-green-200'}">WIN</button>
                                <button onclick="setState({outcome: 'tie'})" class="py-2 rounded ${state.outcome === 'tie' ? 'bg-gray-600 text-white' : 'bg-gray-100 hover:bg-gray-200'}">TIE</button>
                                <button onclick="setState({outcome: 'loss'})" class="py-2 rounded ${state.outcome === 'loss' ? 'bg-red-600 text-white' : 'bg-red-100 hover:bg-red-200'}">LOSS</button>
                            </div>
                        </div>
                    `;
                } else {
                    outcomeHtml = `
                        <div class="bg-white rounded p-4 mb-3 shadow">
                            <div class="font-bold mb-2">Who Won?</div>
                            <div class="space-y-2">
                                ${validPlayers.map(p => `
                                    <button onclick="let w = [...state.soloWinners]; if(w.includes('${p}')) w = w.filter(x => x !== '${p}'); else w.push('${p}'); setState({soloWinners: w})" class="w-full py-2 rounded ${state.soloWinners.includes(p) ? 'bg-green-600 text-white' : 'bg-green-100 hover:bg-green-200'}">${p} ${state.soloWinners.includes(p) ? '✓' : ''}</button>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }

                app.innerHTML = `
                    <div class="min-h-screen bg-green-100 p-4">
                        <div class="max-w-md mx-auto">
                            <div class="bg-white rounded-lg p-4 shadow-lg">
                                <div class="text-center mb-4">
                                    <h1 class="text-2xl font-bold text-green-800">Hole ${state.hole}/18</h1>
                                    ${state.results[state.hole] ? '<p class="text-sm text-blue-600">✏️ Editing recorded hole</p>' : ''}
                                </div>
                                <div class="flex gap-2 mb-4">
                                    <button onclick="setState({hole: Math.max(1, state.hole - 1), partner: null, outcome: null, multiplier: 1, soloWinners: []})" ${state.hole === 1 ? 'disabled' : ''} class="flex-1 bg-blue-500 text-white py-2 rounded disabled:bg-gray-300">← PREV</button>
                                    <button onclick="setState({hole: Math.min(18, state.hole + 1), partner: null, outcome: null, multiplier: 1, soloWinners: []})" ${state.hole === 18 ? 'disabled' : ''} class="flex-1 bg-blue-500 text-white py-2 rounded disabled:bg-gray-300">NEXT →</button>
                                </div>
                                <div class="grid grid-cols-2 gap-2 mb-4">
                                    ${validPlayers.map(p => `
                                        <div class="p-3 rounded text-center ${p === wolf ? 'bg-yellow-200 border-2 border-yellow-500' : 'bg-green-100 border-2 border-green-400'}">
                                            <div class="text-sm font-bold">${p === wolf ? '🐺 ' : ''}${p}</div>
                                            <div class="text-2xl font-bold text-green-700">${scores[p]}</div>
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="bg-yellow-100 border-2 border-yellow-400 rounded p-3 mb-4 text-center"><div class="font-bold">WOLF: ${wolf}</div></div>
                                <div class="bg-white rounded p-4 mb-3 shadow">
                                    <div class="font-bold mb-2">Partner:</div>
                                    <div class="space-y-2">
                                        ${others.map(p => `<button onclick="setState({partner: '${p}'})" class="w-full py-2 rounded ${state.partner === p ? 'bg-blue-600 text-white' : 'bg-blue-100 hover:bg-blue-200'}">${p}</button>`).join('')}
                                        <button onclick="setState({partner: 'LONE'})" class="w-full py-2 rounded ${state.partner === 'LONE' ? 'bg-purple-600 text-white' : 'bg-purple-100 hover:bg-purple-200'}">🐺 LONE</button>
                                        <button onclick="setState({partner: 'SOLO'})" class="w-full py-2 rounded ${state.partner === 'SOLO' ? 'bg-orange-600 text-white' : 'bg-orange-100 hover:bg-orange-200'}">🎯 SOLO</button>
                                    </div>
                                </div>
                                ${outcomeHtml}
                                <div class="bg-white rounded p-4 mb-4 shadow">
                                    <div class="font-bold mb-2">Multiplier:</div>
                                    <select onchange="setState({multiplier: parseInt(this.value)})" class="w-full px-3 py-2 border-2 border-green-400 rounded">
                                        <option value="1" ${state.multiplier === 1 ? 'selected' : ''}>1x Regular</option>
                                        <option value="2" ${state.multiplier === 2 ? 'selected' : ''}>2x Birdie</option>
                                        <option value="3" ${state.multiplier === 3 ? 'selected' : ''}>3x Eagle</option>
                                    </select>
                                </div>
                                <button onclick="saveHole()" class="w-full bg-green-600 text-white font-bold py-3 rounded hover:bg-green-700">${state.results[state.hole] ? 'UPDATE' : 'RECORD'} HOLE</button>
                            </div>
                        </div>
                    </div>
                `;
            } else if (state.screen === 'end') {
                const validPlayers = getValidPlayers();
                const scores = getScores(18);
                const sorted = [...validPlayers].sort((a, b) => scores[b] - scores[a]);

                app.innerHTML = `
                    <div class="min-h-screen bg-green-100 p-4 flex items-center justify-center">
                        <div class="bg-white rounded-lg p-8 max-w-md w-full shadow-lg">
                            <h1 class="text-3xl font-bold text-green-800 mb-6 text-center">${state.gameMode === 'shots' ? '🍺 SHOTS' : '🎉 GAME OVER'}</h1>
                            <div class="space-y-3 mb-6">
                                ${sorted.map((p, i) => `
                                    <div class="flex justify-between items-center p-3 rounded ${state.gameMode === 'shots' ? (i === 0 ? 'bg-red-100 border-2 border-red-500' : 'bg-green-100') : 'bg-green-100'}">
                                        <div>${i === 0 ? (state.gameMode === 'shots' ? '🍺' : '🥇') : i === 1 ? '🥈' : '🥉'} ${p}</div>
                                        <div class="text-2xl font-bold text-green-700">${state.gameMode === 'shots' ? Math.max(0, scores[p]) + ' shots' : scores[p]}</div>
                                    </div>
                                `).join('')}
                            </div>
                            ${state.gameMode === 'shots' ? `<div class="bg-orange-50 border-2 border-orange-300 rounded p-3 mb-6 text-center text-sm"><div class="font-bold text-orange-800">${sorted[0]} takes ${Math.max(0, scores[sorted[0]])} shots! 🍺</div></div>` : ''}
                            <button onclick="setState({screen: 'gameMode', gameMode: null, players: ['','','',''], hole: 1, results: {}, partner: null, outcome: null, multiplier: 1, soloWinners: []})" class="w-full bg-green-600 text-white font-bold py-3 rounded hover:bg-green-700">PLAY AGAIN</button>
                        </div>
                    </div>
                `;
            }
        }

        function saveHole() {
            if (state.partner === 'SOLO') {
                if (state.soloWinners.length === 0) {
                    alert('Select at least one winner');
                    return;
                }
            } else {
                if (state.outcome === null) {
                    alert('Select outcome');
                    return;
                }
            }

            const newResults = { ...state.results };
            if (state.partner === 'SOLO') {
                newResults[state.hole] = { partner: 'SOLO', winners: state.soloWinners, multiplier: state.multiplier };
            } else {
                newResults[state.hole] = { partner: state.partner, outcome: state.outcome, multiplier: state.multiplier };
            }

            if (state.hole < 18) {
                setState({
                    results: newResults,
                    hole: state.hole + 1,
                    partner: null,
                    outcome: null,
                    multiplier: 1,
                    soloWinners: []
                });
            } else {
                setState({ results: newResults, screen: 'end' });
            }
        }

        render();
    </script>
</body>
</html>
